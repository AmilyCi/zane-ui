<!doctype html>
<html dir="ltr" lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
    <script type="module" src="/build/zane-ui.esm.js"></script>
    <script nomodule src="/build/zane-ui.js"></script>
    <link href="/build/zane-ui.css" rel="stylesheet" />

    <style>

      html, body {
        background-color: var(--zane-bg-color);
        color: var(--zane-text-color-primary);
      }

      .demo-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }

      .slider-demo-block {
        max-width: 600px;
        display: flex;
        align-items: center;
      }
      .slider-demo-block zane-slider {
        margin-top: 0;
        margin-left: 12px;
      }
      .slider-demo-block .demonstration {
        font-size: 14px;
        color: var(--zane-text-color-secondary);
        line-height: 44px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-bottom: 0;
      }
      .slider-demo-block .demonstration + zane-slider {
        flex: 0 0 70%;
      }
    </style>
  </head>
  <body>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-autocomplete
        id="autocomplete01"
        class="w-50"
        placeholder="Please Input"
        clearable
      ></zane-autocomplete>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-tree
        id="tree01"
        style="max-width: 600px"
        show-checkbox
        height="200"
      />
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-transfer
        id="transfer01"
        filterable
        filter-placeholder="State Abbreviations"
      ></zane-transfer>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-switch
        class="mb-2"
        active-text="Pay by month"
        inactive-text="Pay by year"
      ></zane-switch>
      <br />
      <zane-switch
        class="mb-2"
        style="--zane-switch-on-color: #13ce66; --zane-switch-off-color: #ff4949"
        active-text="Pay by month"
        inactive-text="Pay by year"
      ></zane-switch>
      <br />
      <zane-switch
        inline-prompt
        active-text="是"
        inactive-text="否"
      ></zane-switch>
      <zane-switch
        class="ml-2"
        inline-prompt
        style="--zane-switch-on-color: #13ce66; --zane-switch-off-color: #ff4949"
        active-text="Y"
        inactive-text="N"
      ></zane-switch>
      <zane-switch
        class="ml-2"
        width="60"
        inline-prompt
        active-text="超出省略"
        inactive-text="超出省略"
      ></zane-switch>
      <zane-switch
        class="ml-2"
        inline-prompt
        style="--zane-switch-on-color: #13ce66; --zane-switch-off-color: #ff4949"
        active-text="完整展示多个内容"
        inactive-text="多个内容"
      ></zane-switch>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <div class="slider-demo-block">
        <span class="demonstration">Default value</span>
        <zane-slider></zane-slider>
      </div>
      <div class="slider-demo-block">
        <span class="demonstration">Customized initial value</span>
        <zane-slider></zane-slider>
      </div>
      <div class="slider-demo-block">
        <span class="demonstration">Hide Tooltip</span>
        <zane-slider show-tooltip="false"></zane-slider>
      </div>
      <div class="slider-demo-block">
        <span class="demonstration">Format Tooltip</span>
        <zane-slider step="10" show-stops></zane-slider>
      </div>
      <div class="slider-demo-block">
        <span class="demonstration">Disabled</span>
        <zane-slider disabled></zane-slider>
      </div>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-select
        multiple
        collapse-tags
        collapse-tags-tooltip
        max-collapse-tags="3"
        filterable
        clearable
        style="width: 240px"
      ></zane-select>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-rate value="3" clearable allow-half show-score></zane-rate>
      <zane-rate value="3" size="small" clearable allow-half show-score></zane-rate>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-mention
        value="@"
        style="width: 320px"
        placeholder="Please input"
      />
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-input-tag
        placeholder="Please input"
        aria-label="Please click the Enter key after input"
      ></zane-input-tag>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <div>
        <zane-radio-group value="radio1">
          <zane-radio value="1" size="large">Option 1</zane-radio>
          <zane-radio value="2" size="large">Option 2</zane-radio>
        </zane-radio-group>
      </div>

      <div>
        <zane-radio-group value="radio" size="large" fill="#409eff">
          <zane-radio-button label="New York" value="New York"></zane-radio-button>
          <zane-radio-button label="Washington" value="Washington"></zane-radio-button>
          <zane-radio-button label="Los Angeles" value="Los Angeles"></zane-radio-button>
          <zane-radio-button label="Chicago" value="Chicago"></zane-radio-button>
        </zane-radio-group>
      </div>
    </div>
    <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);">
      <zane-input-number value="1" min="1" max="10" precision="2" step="0.1" controls-position="right"></zane-input-number>
    </div>

    <script>
      // ------ start cascader ----------------------------------
      var cascaderEl = document.querySelector('zane-cascader');
      if (cascaderEl) {
        const options = [
          {
            value: 'guide',
            label: 'Guide',
            disabled: true,
            children: [
              {
                value: 'disciplines',
                label: 'Disciplines',
                children: [
                  {
                    value: 'consistency',
                    label: 'Consistency',
                  },
                  {
                    value: 'feedback',
                    label: 'Feedback',
                  },
                  {
                    value: 'efficiency',
                    label: 'Efficiency',
                  },
                  {
                    value: 'controllability',
                    label: 'Controllability',
                  },
                ],
              },
              {
                value: 'navigation',
                label: 'Navigation',
                children: [
                  {
                    value: 'side nav',
                    label: 'Side Navigation',
                  },
                  {
                    value: 'top nav',
                    label: 'Top Navigation',
                  },
                ],
              },
            ],
          },
          {
            value: 'component',
            label: 'Component',
            children: [
              {
                value: 'basic',
                label: 'Basic',
                children: [
                  {
                    value: 'layout',
                    label: 'Layout',
                  },
                  {
                    value: 'color',
                    label: 'Color',
                  },
                  {
                    value: 'typography',
                    label: 'Typography',
                  },
                  {
                    value: 'icon',
                    label: 'Icon',
                  },
                  {
                    value: 'button',
                    label: 'Button',
                  },
                ],
              },
              {
                value: 'form',
                label: 'Form',
                children: [
                  {
                    value: 'radio',
                    label: 'Radio',
                  },
                  {
                    value: 'checkbox',
                    label: 'Checkbox',
                  },
                  {
                    value: 'input',
                    label: 'Input',
                  },
                  {
                    value: 'input-number',
                    label: 'InputNumber',
                  },
                  {
                    value: 'select',
                    label: 'Select',
                  },
                  {
                    value: 'cascader',
                    label: 'Cascader',
                  },
                  {
                    value: 'switch',
                    label: 'Switch',
                  },
                  {
                    value: 'slider',
                    label: 'Slider',
                  },
                  {
                    value: 'time-picker',
                    label: 'TimePicker',
                  },
                  {
                    value: 'date-picker',
                    label: 'DatePicker',
                  },
                  {
                    value: 'datetime-picker',
                    label: 'DateTimePicker',
                  },
                  {
                    value: 'upload',
                    label: 'Upload',
                  },
                  {
                    value: 'rate',
                    label: 'Rate',
                  },
                  {
                    value: 'form',
                    label: 'Form',
                  },
                ],
              },
              {
                value: 'data',
                label: 'Data',
                children: [
                  {
                    value: 'table',
                    label: 'Table',
                  },
                  {
                    value: 'tag',
                    label: 'Tag',
                  },
                  {
                    value: 'progress',
                    label: 'Progress',
                  },
                  {
                    value: 'tree',
                    label: 'Tree',
                  },
                  {
                    value: 'pagination',
                    label: 'Pagination',
                  },
                  {
                    value: 'badge',
                    label: 'Badge',
                  },
                ],
              },
              {
                value: 'notice',
                label: 'Notice',
                children: [
                  {
                    value: 'alert',
                    label: 'Alert',
                  },
                  {
                    value: 'loading',
                    label: 'Loading',
                  },
                  {
                    value: 'message',
                    label: 'Message',
                  },
                  {
                    value: 'message-box',
                    label: 'MessageBox',
                  },
                  {
                    value: 'notification',
                    label: 'Notification',
                  },
                ],
              },
              {
                value: 'navigation',
                label: 'Navigation',
                children: [
                  {
                    value: 'menu',
                    label: 'Menu',
                  },
                  {
                    value: 'tabs',
                    label: 'Tabs',
                  },
                  {
                    value: 'breadcrumb',
                    label: 'Breadcrumb',
                  },
                  {
                    value: 'dropdown',
                    label: 'Dropdown',
                  },
                  {
                    value: 'steps',
                    label: 'Steps',
                  },
                ],
              },
              {
                value: 'others',
                label: 'Others',
                children: [
                  {
                    value: 'dialog',
                    label: 'Dialog',
                  },
                  {
                    value: 'tooltip',
                    label: 'Tooltip',
                  },
                  {
                    value: 'popover',
                    label: 'Popover',
                  },
                  {
                    value: 'card',
                    label: 'Card',
                  },
                  {
                    value: 'carousel',
                    label: 'Carousel',
                  },
                  {
                    value: 'collapse',
                    label: 'Collapse',
                  },
                ],
              },
            ],
          },
          {
            value: 'resource',
            label: 'Resource',
            children: [
              {
                value: 'axure',
                label: 'Axure Components',
              },
              {
                value: 'sketch',
                label: 'Sketch Templates',
              },
              {
                value: 'docs',
                label: 'Design Documentation',
              },
            ],
          },
        ]

        cascaderEl.options = options
        cascaderEl.props = { multiple: true }
      }

      // ------ start mention ----------------------------------
      var mentionEl = document.querySelector('zane-mention');
      if (mentionEl) {
        mentionEl.options = [
          {
            label: 'Fuphoenixes',
            value: 'Fuphoenixes',
          },
          {
            label: 'kooriookami',
            value: 'kooriookami',
          },
          {
            label: 'Jeremy',
            value: 'Jeremy',
          },
          {
            label: 'btea',
            value: 'btea',
          },
        ];
      }

      // ------ start select ----------------------------------
      var selectEl = document.querySelector('zane-select');
      if (selectEl) {
        const initials = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j'];
        const options = Array.from({ length: 1000 }).map((_, idx) => ({
          value: `Option ${idx + 1}`,
          label: `${initials[idx % 10]}${idx}`,
        }));
        selectEl.options = options;
      }

      // ------ start transfer ----------------------------------
      var transfer01El = document.querySelector('#transfer01');
      if (transfer01El) {
        const data = []
        for (let i = 1; i <= 15; i++) {
          data.push({
            key: i,
            label: `Option ${i}`,
            disabled: i % 4 === 0,
          })
        }
        transfer01El.data = data;
      }
      // ------ start tree ----------------------------------
      var tree01El = document.querySelector('#tree01');
      if (tree01El) {
        const props = {
          value: 'id',
          label: 'label',
          children: 'children',
        };
        const getKey = (prefix, id) => {
          return `${prefix}-${id}`
        };

        function createData(
          maxDeep,
          maxChildren,
          minNodesNumber,
          deep = 1,
          key = 'node'
        ) {
          let id = 0
          return Array.from({ length: minNodesNumber })
            .fill(deep)
            .map(() => {
              const childrenNumber =
                deep === maxDeep ? 0 : Math.round(Math.random() * maxChildren)
              const nodeKey = getKey(key, ++id)
              return {
                id: nodeKey,
                label: nodeKey,
                children: childrenNumber
                  ? createData(maxDeep, maxChildren, childrenNumber, deep + 1, nodeKey)
                  : undefined,
              }
            })
        }

        tree01El.data = createData(4, 30, 40);
        tree01El.props = props;
      }

      // ---  start autocomplete ---------------------
      var autocomplete01 = document.querySelector('#autocomplete01')
      if (autocomplete01) {
        const restaurants = [
          { value: 'vue', link: 'https://github.com/vuejs/vue' },
          { value: 'element', link: 'https://github.com/ElemeFE/element' },
          { value: 'cooking', link: 'https://github.com/ElemeFE/cooking' },
          { value: 'mint-ui', link: 'https://github.com/ElemeFE/mint-ui' },
          { value: 'vuex', link: 'https://github.com/vuejs/vuex' },
          { value: 'vue-router', link: 'https://github.com/vuejs/vue-router' },
          { value: 'babel', link: 'https://github.com/babel/babel' },
        ];

        const createFilter = (queryString) => {
          return (restaurant) => {
            return (
              restaurant.value.toLowerCase().indexOf(queryString.toLowerCase()) === 0
            )
          }
        }

        const querySearch = (queryString, cb) => {
          const results = queryString
            ? restaurants.filter(createFilter(queryString))
            : restaurants
          // call callback function to return suggestions
          cb(results)
        }

        autocomplete01.fetchSuggestions = querySearch;
      }
    </script>
  </body>
</html>
